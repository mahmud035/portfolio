    <!--
      No-flash theme init: runs before React hydrates so the correct theme
      class is on <html> for the very first paint. Mirrors ThemeProvider logic.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          // Default dark: only fall back to light when the OS *explicitly*
          // prefers light. No stored value + no OS preference => dark.
          var prefersLight = window.matchMedia(
            '(prefers-color-scheme: light)',
          ).matches;
          var isDark = stored ? stored === 'dark' : !prefersLight;
          document.documentElement.classList.toggle('dark', isDark);
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
